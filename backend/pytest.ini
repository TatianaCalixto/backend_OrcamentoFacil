[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
testpaths = tests
# S10-T05: cobertura minima global = 80%. --cov-fail-under quebra a build
# se cair abaixo. Override local: pytest --no-cov ou pytest --cov-fail-under=0.
addopts =
    -ra
    --strict-markers
    --cov=app
    --cov-report=term-missing
    --cov-fail-under=80
filterwarnings =
    ignore::DeprecationWarning:slowapi.*
