name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: orcafacil
          POSTGRES_PASSWORD: orcafacil
          POSTGRES_DB: orcafacil_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U orcafacil -d orcafacil_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: orcafacil
      POSTGRES_PASSWORD: orcafacil
      POSTGRES_DB: orcafacil_test
      DATABASE_URL: postgresql+psycopg://orcafacil:orcafacil@localhost:5432/orcafacil_test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Security audit (pip-audit + OSV severity gate)
        run: python ../scripts/ci_pip_audit.py -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (black)
        run: black --check .

      - name: Run tests
        run: pytest
